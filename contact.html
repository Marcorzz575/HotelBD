<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Gestionar Mis Reservas - Hotel Paraiso</title>
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<link rel="stylesheet" href="css/style.css" type="text/css">
	<link rel="stylesheet" href="css/estilo.css" type="text/css">
	<style>
		.search-section {
			background: #ffffff;
			padding: 25px;
			border-radius: 8px;
			box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
			max-width: 600px;
			margin: 20px auto;
		}

		.search-section input[type="email"] {
			width: 70%;
			padding: 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
		}

		.search-section button {
			padding: 10px 20px;
			background: #00695c;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-weight: bold;
		}

		.reserva-card {
			background: #f9f9f9;
			border-left: 5px solid #00695c;
			padding: 15px;
			margin-top: 15px;
			border-radius: 4px;
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.btn-edit {
			background: #2980b9;
			color: white;
			border: none;
			padding: 6px 12px;
			border-radius: 4px;
			cursor: pointer;
		}

		.btn-del {
			background: #c0392b;
			color: white;
			border: none;
			padding: 6px 12px;
			border-radius: 4px;
			cursor: pointer;
			margin-left: 5px;
		}

		.modal-inputs input {
			width: 100%;
			padding: 8px;
			margin-top: 5px;
			margin-bottom: 10px;
			border: 1px solid #ccc;
			border-radius: 4px;
		}
	</style>
</head>

<body>
	<div id="background">
		<div id="page">
			<div id="header">
				<div id="logo">
					<a href="index.html"><img src="images/LogoFinal.png" alt="LOGO" height="112" width="118"></a>
				</div>
				<div id="navigation">
					<ul>
						<li><a href="index.html">INICIO</a></li>
						<li><a href="about.html">SERVICIO</a></li>
						<li><a href="habitaciones.html">HABITACIONES</a></li>
						<li><a href="foods.html">RESERVACIONES</a></li>
						<li class="selected"><a href="contact.html">MIS RESERVAS</a></li>
						<li><a href="admin.html">RECEPCIÓN</a></li>
					</ul>
				</div>
			</div>

			<div id="contents">
				<div class="box">
					<div class="body">
						<h1 style="text-align: center;">PORTAL DE AUTOGESTIÓN DE CLIENTES</h1>
						<p style="text-align: center;">Introduce tu correo electrónico institucional o personal para
							consultar, modificar o cancelar tus reservaciones vigentes.</p>

						<div class="search-section">
							<label for="clientEmail"><b>Correo Electrónico:</b></label><br><br>
							<input type="email" id="clientEmail" placeholder="ejemplo@correo.com" required>
							<button onclick="buscarReservas()">Buscar</button>
						</div>

						<div id="resultados-reservas" style="max-width: 800px; margin: 30px auto;"></div>
					</div>
				</div>
			</div>
		</div>
		<div id="footer">
			<p>© 2026 Sistema de Autogestión - Hotel Paraíso.</p>
		</div>
	</div>

	<script>
		async function buscarReservas() {
			const correo = document.getElementById('clientEmail').value;
			const contenedor = document.getElementById('resultados-reservas');
			if (!correo) { alert("Introduce tu correo"); return; }

			contenedor.innerHTML = "<p>Buscando reservaciones...</p>";

			try {
				const res = await fetch(`procesar_cliente.php?accion=buscar&correo=${correo}`);
				const datos = await res.json();

				if (datos.length === 0 || datos.Error) {
					contenedor.innerHTML = "<p style='text-align:center; color: red;'>No se encontraron reservaciones activas para este correo.</p>";
					return;
				}

				let html = "<h3>Tus Reservaciones Encontradas:</h3>";
				datos.forEach(r => {
					html += `
                        <div class="reserva-card">
                            <div>
                                <p><b>ID Reserva:</b> ${r.ID_Reservacion} | <b>Habitación:</b> ${r.Numero_Habitacion} (${r.Tipo})</p>
                                <p><b>Llegada:</b> ${r.Fecha_Llegada} | <b>Salida:</b> ${r.Fecha_Salida}</p>
                                <p><b>Total a pagar:</b> $${r.Monto_Total} MXN</p>
                            </div>
                            <div>
                                <button class="btn-edit" onclick="abrirEditor(${r.ID_Reservacion}, '${r.Fecha_Llegada}', '${r.Fecha_Salida}', '${r.Tipo}')">Editar Fechas</button>
                                <button class="btn-del" onclick="eliminarReserva(${r.ID_Reservacion})">Cancelar</button>
                            </div>
                        </div>
                    `;
				});
				contenedor.innerHTML = html;
			} catch (e) {
				contenedor.innerHTML = "<p style='color:red;'>Error de comunicación al buscar datos.</p>";
			}
		}

		async function eliminarReserva(id) {
			if (!confirm("¿Estás seguro de que deseas cancelar de forma permanente esta reservación?")) return;
			try {
				const res = await fetch(`procesar_cliente.php?accion=eliminar&id=${id}`);
				const r = await res.text();
				if (r.trim() === "ok") {
					alert("Reservación cancelada con éxito.");
					buscarReservas();
				} else {
					alert("Error al procesar la cancelación.");
				}
			} catch (e) { alert("Error de red."); }
		}

		function abrirEditor(id, entrada, salida, tipoHab) {
			const nuevaEntrada = prompt("Modificar fecha de Entrada (AAAA-MM-DD):", entrada);
			if (!nuevaEntrada) return;
			const nuevaSalida = prompt("Modificar fecha de Salida (AAAA-MM-DD):", salida);
			if (!nuevaSalida) return;

			const data = new FormData();
			data.append("id", id);
			data.append("entrada", nuevaEntrada);
			data.append("salida", nuevaSalida);
			data.append("tipo", tipoHab);

			fetch("procesar_cliente.php?accion=editar", { method: "POST", body: data })
				.then(res => res.text())
				.then(r => {
					if (r.trim() === "ok") {
						alert("Reservación reprogramada y monto recalculado de forma exitosa.");
						buscarReservas();
					} else {
						alert("Error: Las fechas elegidas se cruzan con otra reservación o con un mantenimiento activo.");
					}
				});
		}
	</script>
</body>

</html>
